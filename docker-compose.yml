version: "3.9"

services:
  # ─── Database ─────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: election_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: election_user
      POSTGRES_PASSWORD: election_pass
      POSTGRES_DB: election_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U election_user -d election_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── Redis ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: election_redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── Backend (Django) ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: election_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_DB: election_db
      POSTGRES_USER: election_user
      POSTGRES_PASSWORD: election_pass
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      REDIS_URL: redis://redis:6379/0
      DEBUG: "false"
      ALLOWED_HOSTS: diplom.robiyaxon.uz,backend,localhost
      ALLOWED_ORIGINS: https://diplom.robiyaxon.uz,http://localhost:3000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    command: sh -c "python manage.py collectstatic --no-input && python manage.py migrate && daphne -b 0.0.0.0 -p 8000 config.asgi:application"

  # ─── Frontend (Next.js) ───────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: election_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: https://diplom.robiyaxon.uz/api/v1
      NEXT_PUBLIC_WS_URL: wss://diplom.robiyaxon.uz/ws/
    depends_on:
      - backend

  # ─── Nginx Reverse Proxy ──────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: election_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:
